# 9Router (OpenAI-compatible local gateway) — example config
# Routes inference requests across multiple model providers via single API surface.

base_url: "http://localhost:20128/v1"
api_key: "sk-9router"

routes:
  # Combo agent (default for chat / reasoning)
  combo:
    upstream: "anthropic"
    model: "claude-sonnet-4"
    fallback: "deepseek-v3-flash"

  # Vision tasks
  vision:
    upstream: "kr"
    model: "claude-sonnet-4.5"

  # Coding tasks
  code:
    upstream: "deepseek"
    model: "deepseek-v4-flash"
    max_tokens: 8000
    extra:
      reasoning_max_tokens: 1500

  # Cheap / fast queries
  fast:
    upstream: "qwen"
    model: "qwen2.5-coder-32b"

  # MiMo (planned)
  # mimo:
  #   upstream: "xiaomi-mimo"
  #   base_url: "https://platform.xiaomimimo.com/v1"
  #   model: "mimo-v2.5"
